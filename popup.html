<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Collector</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    
    h1 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-label {
      font-weight: 500;
      color: #666;
      margin-bottom: 8px;
      display: block;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #106ebe;
    }
    
    button:active {
      background-color: #005a9e;
    }
    
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .file-info {
      padding: 8px;
      background-color: #f5f5f5;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 13px;
      word-break: break-all;
      min-height: 20px;
    }
    
    .file-info.empty {
      color: #999;
      font-style: italic;
    }
    
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      min-height: 20px;
      display: none;
    }
    
    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    
    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    
    .status.info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Content Collector</h1>
  
  <div class="section">
    <span class="section-label">Selected File:</span>
    <div id="fileInfo" class="file-info empty">No file selected</div>
    <button id="selectFileBtn">Select JSON File</button>
  </div>
  
  <div class="section">
    <button id="scrapeBtn" disabled>Scrape Current Tab to File</button>
    <button id="copyToClipboardBtn" style="margin-top: 8px;">Copy Current Tab Text to Clipboard</button>
  </div>
  
  <div id="status" class="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
